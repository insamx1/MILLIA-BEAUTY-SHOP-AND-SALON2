<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Milia Beauty Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<meta name="theme-color" content="#c2185b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Milia Beauty">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23c2185b'/%3E%3Ctext x='256' y='340' font-size='240' text-anchor='middle' font-family='Arial Black,sans-serif' fill='white'%3EMB%3C/text%3E%3C/svg%3E">
<style>
:root{
  --p:#c2185b;
  --p-light:#fce4ec;
  --bg:#f8f9fa;
  --card:#ffffff;
  --text:#212529;
  --text-muted:#6c757d;
  --border:#dee2e6;
  --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);padding-bottom:100px;overflow-x:hidden;}
/* Minimal UI style for layout placeholder - your full layout remains unchanged */
.header{background:var(--p);color:white;padding:20px;text-align:center;font-weight:700;font-size:24px;}
.container{padding:20px;max-width:800px;margin:0 auto;}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.btn{background:var(--p);color:white;border:none;padding:14px;border-radius:12px;font-weight:600;cursor:pointer;font-size:16px;text-align:center;display:inline-block;text-decoration:none;}
.btn-secondary{background:#e9ecef;color:var(--text);}
.file-input-wrapper{position:relative;overflow:hidden;display:inline-block;width:100%;}
.file-input-wrapper input[type=file]{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;}
</style>
</head>
<body>

<div class="header">Milia Beauty Shop - Data Center</div>

<div class="container">
  <div class="card">
    <h3>Database Backup & Recovery (Excel Engine)</h3>
    <p style="color:var(--text-muted); margin: 10px 0 20px 0; font-size:14px;">
      Export your entire database into a multi-sheet Excel file. You can edit rows in Excel, add rows, or fix values, then upload it back to completely overwrite existing data.
    </p>
    
    <button class="btn" style="width:100%;" onclick="backupToExcel()">📥 Download Excel Backup</button>
    
    <div class="btn-group">
      <div class="file-input-wrapper">
        <button class="btn btn-secondary" style="width:100%;">📂 Select Excel File</button>
        <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleFileSelect(this)">
      </div>
      <button class="btn" style="background:#2e7d32;" onclick="restoreFromExcel()">📤 Restore & Overwrite</button>
    </div>
    <div id="fileStatus" style="margin-top:12px; font-size:13px; color:var(--p); font-weight:600;"></div>
  </div>
</div>

<script>
// Placeholder data arrays mimicking your live system storage
let dbData = {
  hair: [
    { id: 1, type: "Bone Straight", length: "22 inches", color: "Natural Black", stockQty: 5, buyPrice: 150000, sellPrice: 220000, supplier: "Aliexpress Vendor", notes: "Premium grade" }
  ],
  showcase: [
    { id: 1, item_name: "Mannequin Head", category: "Display", stockQty: 2, buyPrice: 45000, sellPrice: 60000, notes: "Table stand included" }
  ],
  hairproducts: [
    { id: 1, productName: "Eco Styler Gel", category: "Gels", qtyPerBag: 12, stockQty: 24, totalPieces: 24, supplier: "Local Wholesaler", buyPrice: 8000, sellPrice: 12000, lowAlert: 5, notes: "Argan oil variant", addedOn: "2026-06-18" }
  ],
  sales: [
    { id: 1, productId: "H-1", productName: "Bone Straight", category: "Hair", customer: "Walk-in", qty: 1, unitPrice: 220000, total: 220000, cost: 150000, payment: "Cash", date: "2026-06-18", by: "Admin", sn: "REC-001" }
  ],
  expenses: [
    { id: 1, desc: "Electricity Bill", amount: 50000, category: "Utilities", date: "2026-06-15" }
  ]
};

let selectedWorkbookData = null;

function handleFileSelect(input) {
  const file = input.files[0];
  const statusDiv = document.getElementById('fileStatus');
  if (file) {
    statusDiv.innerText = `Selected: ${file.name} (Reading...)`;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        selectedWorkbookData = workbook;
        statusDiv.innerText = `Ready to restore: ${file.name} (${workbook.SheetNames.length} tables found)`;
        statusDiv.style.color = "#2e7d32";
      } catch (err) {
        statusDiv.innerText = "Error reading Excel file. Make sure it's a valid layout.";
        statusDiv.style.color = "#c2185b";
        selectedWorkbookData = null;
      }
    };
    reader.readAsArrayBuffer(file);
  }
}

// 📥 EXPORT ENGINE: Pulls live data arrays, constructs 5 clear Excel tabs, triggers browser download
function backupToExcel() {
  try {
    const wb = XLSX.utils.book_new();
    
    // Transform system objects safely to uniform row keys for spreadsheets
    const hairSheet = XLSX.utils.json_to_sheet(dbData.hair);
    const showcaseSheet = XLSX.utils.json_to_sheet(dbData.showcase);
    const productsSheet = XLSX.utils.json_to_sheet(dbData.hairproducts);
    const salesSheet = XLSX.utils.json_to_sheet(dbData.sales);
    const expensesSheet = XLSX.utils.json_to_sheet(dbData.expenses);
    
    // Append each database table as its own dedicated tab
    XLSX.utils.book_append_sheet(wb, hairSheet, "Hair Inventory");
    XLSX.utils.book_append_sheet(wb, showcaseSheet, "Showcase");
    XLSX.utils.book_append_sheet(wb, productsSheet, "Hair Products");
    XLSX.utils.book_append_sheet(wb, salesSheet, "Sales Logs");
    XLSX.utils.book_append_sheet(wb, expensesSheet, "Expenses");
    
    // Generate filename stamp
    const dateStamp = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `Milia_Beauty_Backup_${dateStamp}.xlsx`);
  } catch (error) {
    alert("Failed to compile Excel file: " + error.message);
  }
}

// 📤 IMPORT & OVERWRITE ENGINE: Parses sheets, maps rows back to target configurations, executes complete wipe/restore
function restoreFromExcel() {
  if (!selectedWorkbookData) {
    alert("Please select a valid Excel file first using the 'Select Excel File' button.");
    return;
  }
  
  if (!confirm("⚠️ WARNING: This will completely wipe all current data in the application and replace it with the rows from this Excel document. Proceed?")) {
    return;
  }
  
  try {
    const wb = selectedWorkbookData;
    let restored = { hair: [], showcase: [], hairproducts: [], sales: [], expenses: [] };
    
    // Map sheet index matching names or positions
    wb.SheetNames.forEach(sheetName => {
      const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
      
      if (sheetName.toLowerCase().includes("hair inventory")) {
        restored.hair = jsonData.map(r => ({
          id: Number(r.id) || Date.now() + Math.random(),
          type: r.type || '',
          length: r.length || '',
          color: r.color || '',
          stockQty: Number(r.stockQty) || 0,
          buyPrice: Number(r.buyPrice) || 0,
          sellPrice: Number(r.sellPrice) || 0,
          supplier: r.supplier || '',
          notes: r.notes || ''
        }));
      } 
      else if (sheetName.toLowerCase().includes("showcase")) {
        restored.showcase = jsonData.map(r => ({
          id: Number(r.id) || Date.now() + Math.random(),
          item_name: r.item_name || '',
          category: r.category || '',
          stockQty: Number(r.stockQty) || 0,
          buyPrice: Number(r.buyPrice) || 0,
          sellPrice: Number(r.sellPrice) || 0,
          notes: r.notes || ''
        }));
      } 
      else if (sheetName.toLowerCase().includes("products")) {
        restored.hairproducts = jsonData.map(r => ({
          id: Number(r.id) || Date.now() + Math.random(),
          productName: r.productName || '',
          category: r.category || '',
          qtyPerBag: Number(r.qtyPerBag) || null,
          stockQty: Number(r.stockQty) || 0,
          totalPieces: Number(r.totalPieces) || 0,
          supplier: r.supplier || '',
          buyPrice: Number(r.buyPrice) || 0,
          sellPrice: Number(r.sellPrice) || 0,
          lowAlert: Number(r.lowAlert) || 3,
          notes: r.notes || '',
          addedOn: r.addedOn || new Date().toISOString().slice(0,10)
        }));
      } 
      else if (sheetName.toLowerCase().includes("sales")) {
        restored.sales = jsonData.map(r => ({
          id: Number(r.id) || Date.now() + Math.random(),
          productId: r.productId || '',
          productName: r.productName || '',
          category: r.category || '',
          customer: r.customer || 'Walk-in',
          qty: Number(r.qty) || 0,
          unitPrice: Number(r.unitPrice) || 0,
          total: Number(r.total) || 0,
          cost: Number(r.cost) || 0,
          payment: r.payment || 'Cash',
          date: r.date || new Date().toISOString().slice(0,10),
          by: r.by || '',
          sn: r.sn || ''
        }));
      } 
      else if (sheetName.toLowerCase().includes("expenses")) {
        restored.expenses = jsonData.map(r => ({
          id: Number(r.id) || Date.now() + Math.random(),
          desc: r.desc || '',
          amount: Number(r.amount) || 0,
          category: r.category || 'Other',
          date: r.date || new Date().toISOString().slice(0,10)
        }));
      }
    });

    // Overwrite runtime memory state
    dbData = restored;
    
    // Save to LocalStorage or sync with your Supabase configurations here:
    // localStorage.setItem('milia_backup_local', JSON.stringify(dbData));
    
    alert("🎉 Database successfully overwritten and restored from Excel!");
    document.getElementById('fileStatus').innerText = "Database successfully updated.";
    document.getElementById('excelFile').value = ""; // Clear file field
    selectedWorkbookData = null;
    
    // If you have a global custom render function to redraw tables, call it here:
    // initApplicationState();

  } catch (error) {
    alert("Parsing Error. Please ensure column titles match structure criteria: " + error.message);
  }
}
</script>

</body>
</html>
